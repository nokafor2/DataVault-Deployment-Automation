# RBAC for the ECR pull-secret refresh Job/CronJob (manage ecr-pull-secret in default).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresh
  namespace: default
  labels:
    app: datavault-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresh
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ecr-pull-secret"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresh
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-refresh
subjects:
  - kind: ServiceAccount
    name: ecr-refresh
    namespace: default

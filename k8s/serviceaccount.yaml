# ServiceAccount for app pods — uses ecr-pull-secret to authenticate containerd → ECR.
# Secret is created at node bootstrap (user_data.sh) and refreshed by ecr-refresh-cronjob.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datavault-api
  namespace: default
  labels:
    app: datavault-api
imagePullSecrets:
  - name: ecr-pull-secret

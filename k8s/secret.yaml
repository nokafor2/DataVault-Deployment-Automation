# Secret: sensitive values stored base64-encoded (NOT encryption — use Sealed Secrets in prod).
# Referenced by deployment.yaml envFrom — never bake API keys into the Docker image.
apiVersion: v1
kind: Secret
metadata:
  name: datavault-secrets
  namespace: default
  labels:
    app: datavault-api
type: Opaque
data:
  # echo -n 'datavault-dev-key' | base64
  # Production: replace via External Secrets Operator or Sealed Secrets — do not commit real keys
  API_KEY: ZGF0YXZhdWx0LWRldi1rZXk=
